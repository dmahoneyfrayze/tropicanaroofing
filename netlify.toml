[build]
  publish = "."

[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = true

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.images]
  compress = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[redirects]]
  from = "/home"
  to = "/"
  status = 301

[[redirects]]
  from = "/contact"
  to = "/free-estimate.html"
  status = 301

[[redirects]]
  from = "/estimate"
  to = "/free-estimate.html"
  status = 301

[[redirects]]
  from = "/emergency"
  to = "/storm-damage.html"
  status = 301

[[redirects]]
  from = "/service-areas/*"
  to = "/scarborough.html"
  status = 301
